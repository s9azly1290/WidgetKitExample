workflows:
  widgetkit-example-release:
    name: WidgetKitExample IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.tigi44.WidgetKitExample

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "WidgetKitExample.xcodeproj"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "WidgetKitExample.xcodeproj" \
            --scheme "WidgetKitExample"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
