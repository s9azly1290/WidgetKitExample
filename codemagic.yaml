workflows:
  widgetkit-example-build:
    name: WidgetKitExample Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Build app for simulator
        script: |
          xcodebuild \
            -project "WidgetKitExample.xcodeproj" \
            -scheme "WidgetKitExample" \
            -configuration Debug \
            -sdk iphonesimulator \
            build

    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.appex
      - /tmp/xcodebuild_logs/*.log
